# Trader Archetype registry — TI-CONS source of truth (Phase 10 seed).
#
# Spec: dixvision_executive_summary.md — "Scale: 30 seed traders × 5
# behavioural dimensions → 300 archetypes. Each archetype in
# registry/trader_archetypes.yaml carries {state, decay_rate,
# performance_score} (INV-51)."
#
# This file ships the v0 hand-written seed (10 archetypes covering 10
# named seed-trader philosophies). The full 30×5=300 grid will be
# minted by the offline trader-intelligence pipeline (TI-LRN +
# TI-CONS) over time. Until that pipeline is live, this hand-written
# set is the bootstrap corpus the composition engine reads from.
#
# Governance rules:
#   * State transitions (PROPOSED → ACTIVE → DECAYING → DEMOTED) are
#     offline-only and flow through the Governance patch pipeline
#     (INV-51 — "offline-only demotion"). Engines never mutate state
#     here on the hot path; the loader is read-only.
#   * The 5 behavioural dimensions are: belief_system, risk_attitude,
#     time_horizon, conviction_style, regime_performance.
#   * Each archetype declares a stable opaque archetype_id (TA-XXXX-NNN
#     family/index). The seed_trader field is documentation only;
#     identity for matching is the archetype_id.
#
# Schema (per entry under archetypes:):
#   archetype_id:                # TA-<family>-<index>
#     name: str                  # human-readable label
#     state: PROPOSED|ACTIVE|DECAYING|DEMOTED
#     decay_rate: float          # in [0, 1]; per-window performance decay
#     performance_score: float   # in [-1, 1]; live-ledger weighted
#     seed_trader: str           # documentation-only seed name
#     dimensions:
#       belief_system: {tag: strength}      # tag→[0,1]
#       risk_attitude: CONSERVATIVE|MODERATE|AGGRESSIVE|UNKNOWN
#       time_horizon: SCALP|INTRADAY|SWING|POSITION|UNKNOWN
#       conviction_style: REACTIVE|PREDICTIVE|CONTRARIAN|SYSTEMATIC|UNKNOWN
#       regime_performance: {regime: score}  # regime→[-1,1]

