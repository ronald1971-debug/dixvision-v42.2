# Plugin registry — PLUGIN-ACT-01 source of truth (Phase E0 seed).
#
# All entries start DISABLED; lifecycle changes flow through the Governance
# pipeline only (PLUGIN-ACT-05). Phase E0 ships the schema + an empty seed;
# concrete plugins land in Phase E2..E6 per build_plan.md.
#
# Schema:
#   <slot_path>:
#     name: str
#     version: str
#     status: DISABLED | SHADOW | ACTIVE
#     config: { ... }
#     depends_on: [str]

plugins:
  intelligence_engine:
    # Phase 3 (Build Compiler Spec §2): Indira market engine —
    # signal pipeline + strategy lifecycle engine + learning interface.
    # Microstructure v1 was wired in Phase E2; the strategy_runtime
    # modules below are the new building blocks per Phase 3.
    microstructure:
      - name: microstructure_v1
        version: "0.1.0"
        status: SHADOW   # Phase E2 — wired but does not produce live trades
        config:
          tolerance_bps: 2.0
          confidence_scale_bps: 50.0
          min_confidence: 0.0
        depends_on: []
    signal_pipeline:
      - name: signal_pipeline
        spec_id: IND-SP-01
        version: "1.0.0"
        status: ACTIVE
        depends_on: [strategy_state_machine, regime_detector,
                     strategy_scheduler, strategy_orchestrator,
                     conflict_resolver]
    strategy_runtime:
      - name: strategy_state_machine
        spec_id: IND-SLM-01
        version: "1.0.0"
        status: ACTIVE   # PROPOSED → SHADOW → CANARY → LIVE → RETIRED + FAILED
        depends_on: []
      - name: regime_detector
        spec_id: IND-REG-01
        version: "1.0.0"
        status: ACTIVE
        config:
          window: 32
          trend_threshold_bps: 5.0
          volatility_threshold_bps: 25.0
        depends_on: []
      - name: strategy_scheduler
        spec_id: IND-SCH-01
        version: "1.0.0"
        status: ACTIVE   # bar-aligned cadence
        depends_on: []
      - name: strategy_orchestrator
        spec_id: IND-ORC-01
        version: "1.0.0"
        status: ACTIVE
        depends_on: [strategy_state_machine]
      - name: conflict_resolver
        spec_id: IND-CFR-01
        version: "1.0.0"
        status: ACTIVE   # confidence-weighted vote per symbol
        depends_on: []
    learning_interface:
      - name: learning_interface
        spec_id: IND-LI-01
        version: "1.0.0"
        status: ACTIVE   # Indira → Learning bridge (no cross-engine import)
        depends_on: []
    alpha: []
    alt_data: []
    memory: []
    multi_timeframe: []
    transfer: []
    cognition: []
    agent: []

  execution_engine:
    # Phase 2 (Build Compiler Spec §2): execution core — adapters, order
    # lifecycle FSM, hot-path engine, execution monitor.
    hot_path:
      - name: fast_executor
        spec_id: EXEC-11
        version: "1.0.0"
        status: ACTIVE   # T1-pure; gated against RiskSnapshot
        config:
          max_staleness_ns: 2000000000
          default_qty: 1.0
        depends_on: []
    adapters:
      - name: paper
        version: "0.1.0"
        status: ACTIVE   # Phase E1 default; deterministic, in-process
        config:
          slippage_bps: 0.0
          default_qty: 1.0
        depends_on: []
      - name: adapter_router
        spec_id: EXEC-01
        version: "1.0.0"
        status: ACTIVE
        depends_on: []
    lifecycle:
      - name: order_state_machine
        spec_id: EXEC-LC-01
        version: "1.0.0"
        status: ACTIVE
        depends_on: []
      - name: fill_handler
        spec_id: EXEC-LC-02
        version: "1.0.0"
        status: ACTIVE
        depends_on: [order_state_machine]
      - name: partial_fill_resolver
        spec_id: EXEC-LC-03
        version: "1.0.0"
        status: ACTIVE
        depends_on: [fill_handler]
      - name: retry_logic
        spec_id: EXEC-LC-04
        version: "1.0.0"
        status: ACTIVE
        depends_on: []
      - name: sl_tp_manager
        spec_id: EXEC-LC-05
        version: "1.0.0"
        status: ACTIVE
        depends_on: []
    protections:
      - name: runtime_monitor
        spec_id: EXEC-08
        version: "1.0.0"
        status: ACTIVE   # rolling-window health classifier
        depends_on: []

  system_engine:
    hazard_sensors: []
    health_monitors: []
    state: []

  governance_engine:
    # GOV-CP-01..07 (Build Compiler Spec §0; Phase 1).
    # The Control Plane is wired in code (governance_engine/control_plane/);
    # this registry block records the canonical module set + spec ids so
    # registry-driven introspection (DASH-08 governance panel, audit replay)
    # can enumerate them without importing governance_engine directly.
    control_plane:
      - name: policy_engine
        spec_id: GOV-CP-01
        version: "1.0.0"
        status: ACTIVE
        depends_on: []
      - name: risk_evaluator
        spec_id: GOV-CP-02
        version: "1.0.0"
        status: ACTIVE
        depends_on: [policy_engine]
      - name: state_transition_manager
        spec_id: GOV-CP-03
        version: "1.0.0"
        status: ACTIVE
        depends_on: [policy_engine, ledger_authority_writer]
      - name: event_classifier
        spec_id: GOV-CP-04
        version: "1.0.0"
        status: ACTIVE
        depends_on: []
      - name: ledger_authority_writer
        spec_id: GOV-CP-05
        version: "1.0.0"
        status: ACTIVE
        depends_on: []
      - name: compliance_validator
        spec_id: GOV-CP-06
        version: "1.0.0"
        status: ACTIVE
        depends_on: []
      - name: operator_interface_bridge
        spec_id: GOV-CP-07
        version: "1.0.0"
        status: ACTIVE
        depends_on:
          - policy_engine
          - state_transition_manager
          - ledger_authority_writer
    services: []
    plugin_lifecycle: []

  learning_engine:
    lanes: []

  evolution_engine:
    intelligence_loops: []
    skill_graph: []
    patch_pipeline: []
