# Plugin registry — PLUGIN-ACT-01 source of truth (Phase E0 seed).
#
# All entries start DISABLED; lifecycle changes flow through the Governance
# pipeline only (PLUGIN-ACT-05). Phase E0 ships the schema + an empty seed;
# concrete plugins land in Phase E2..E6 per build_plan.md.
#
# Schema:
#   <slot_path>:
#     name: str
#     version: str
#     status: DISABLED | SHADOW | ACTIVE
#     config: { ... }
#     depends_on: [str]

plugins:
  intelligence_engine:
    microstructure:
      - name: microstructure_v1
        version: "0.1.0"
        status: SHADOW   # Phase E2 — wired but does not produce live trades
        config:
          tolerance_bps: 2.0
          confidence_scale_bps: 50.0
          min_confidence: 0.0
        depends_on: []
    alpha: []
    alt_data: []
    memory: []
    multi_timeframe: []
    transfer: []
    cognition: []
    agent: []

  execution_engine:
    hot_path: []
    adapters:
      - name: paper
        version: "0.1.0"
        status: ACTIVE   # Phase E1 default; deterministic, in-process
        config:
          slippage_bps: 0.0
          default_qty: 1.0
        depends_on: []
    protections: []

  system_engine:
    hazard_sensors: []
    health_monitors: []
    state: []

  governance_engine:
    control_plane: []
    services: []
    plugin_lifecycle: []

  learning_engine:
    lanes: []

  evolution_engine:
    intelligence_loops: []
    skill_graph: []
    patch_pipeline: []
