# SCVS — Source & Consumption Validation System (Phase 1).
#
# Refs:
#   docs/manifest_v3.5_delta.md §SCVS (INV-57, SAFE-54..56)
#   system_engine/scvs/source_registry.py  (loader + schema)
#
# Every external data input the system can ingest is declared here.
# Per SCVS-01 / SCVS-02, the relationship between this file and the
# per-module ``consumes.yaml`` declarations must be bidirectionally
# closed:
#
#   * every ``enabled: true`` source must appear in some
#     ``consumes.yaml`` (no unused live source) — SCVS-01.
#   * every ``consumes.yaml`` ``source_id`` must appear here
#     (no phantom consumption) — SCVS-02.
#
# Phase 1 ships the registry skeleton + the lint surface; runtime
# heartbeats / hazard escalation / schema enforcement land in
# SCVS Phase 2 + Phase 3. Most rows are ``enabled: false`` until
# their adapters are actually wired and exercised by a module.
#
# Schema (per source):
#   id:        SRC-<CATEGORY>-<PROVIDER>-<NNN>     (string, unique)
#   name:      human-readable name                 (string, required)
#   category:  market | news | social | onchain    (string, required)
#              | macro | regulatory | dev | alt
#              | ai | synthetic
#   provider:  short provider id                   (string, required)
#   endpoint:  canonical URL / wss / API root       (string, required)
#   schema:    fully-qualified contract reference  (string, required)
#   auth:      none | required                     (string, required)
#   enabled:   feed is wired and live              (bool, default false)
#   critical:  liveness-fail halts dependents      (bool, default false)
#   notes:     free-form provenance pointer        (string, optional)

