<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="DIX VISION"/>
<link rel="manifest" href="/static/manifest.webmanifest"/>
<link rel="apple-touch-icon" href="/static/icon-192.png"/>
<title>DIX VISION &mdash; pair device</title>
<style>
  :root { --bg:#0b0f14; --fg:#e6edf3; --mut:#98a2b3; --accent:#7fd0ff;
          --card:#101820; --line:#1d2732; --ok:#35c759; --err:#ff6b6b; }
  body { font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--fg); margin:0; padding:24px;
         display:flex; flex-direction:column; align-items:center; gap:14px; }
  .card { background: var(--card); border:1px solid var(--line);
          border-radius:12px; padding:20px 22px; width:100%; max-width:420px; }
  h1 { font-size: 20px; margin:0 0 6px; }
  p { color: var(--mut); font-size: 14px; line-height: 1.4; margin:0 0 10px; }
  input { width:100%; background:#0a121a; color:var(--fg); border:1px solid var(--line);
          border-radius:8px; padding:10px; font: inherit; margin-bottom:8px; }
  button { width:100%; background: var(--accent); color: #06121c; border:0;
           border-radius:8px; padding:12px; font-weight:600; font-size: 15px; }
  .status { margin-top:8px; font-size:13px; }
  .ok { color: var(--ok); } .err { color: var(--err); }
  .mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>Pair this device</h1>
  <p>Scan the QR code from the desktop cockpit, or paste the pairing token below. One tap and this phone is authenticated.</p>
  <input id="t" placeholder="pairing token" autocomplete="off" autocapitalize="off"/>
  <input id="d" placeholder="device name (e.g. iPhone 15)" autocomplete="off"/>
  <button id="go">Pair</button>
  <div id="status" class="status"></div>
</div>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var pre = params.get("t");
  if (pre) document.getElementById("t").value = pre;
  if (!document.getElementById("d").value) {
    document.getElementById("d").value = navigator.userAgent.slice(0, 60);
  }
  document.getElementById("go").onclick = async function () {
    var token = document.getElementById("t").value.trim();
    var device = document.getElementById("d").value.trim();
    var st = document.getElementById("status");
    if (!token) { st.className = "status err"; st.textContent = "Token required."; return; }
    try {
      var r = await fetch("/api/pair/claim", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ token: token, device: device }),
      });
      if (!r.ok) {
        var err = await r.json().catch(function () { return {}; });
        st.className = "status err";
        st.textContent = "Pairing failed: " + (err.detail || r.status);
        return;
      }
      var data = await r.json();
      try { localStorage.setItem("dix_token", data.token); } catch (e) {}
      st.className = "status ok";
      st.innerHTML = "Paired. Redirecting to cockpit\u2026";
      setTimeout(function () { location.href = "/?token=" + encodeURIComponent(data.token); }, 900);
    } catch (e) {
      st.className = "status err";
      st.textContent = "Network error: " + e;
    }
  };
})();
</script>
</body>
</html>
