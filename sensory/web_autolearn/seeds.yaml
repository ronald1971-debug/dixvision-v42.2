# WEBLEARN-10 — sensory.web_autolearn seed registry.
#
# Each top-level key is a stable seed_id used by:
#   * the Crawler to resolve a URL,
#   * the AIFilter to look up keywords,
#   * the Curator to apply admissibility rules.
#
# Schema per seed:
#
#   <seed_id>:
#     url:        canonical URL the crawler fetches (required, non-empty)
#     topic:      topic label carried into CuratedItem.seed_topic (required)
#     keywords:   list[str] of relevance keywords for the AIFilter
#                 (case-insensitive, used by KeywordAIFilter)
#     min_score:  curator threshold in [0.0, 1.0] (default 0.0)
#     allow:      list[str]; if non-empty, at least one must appear
#                 (case-insensitive) in title+body
#     deny:       list[str]; any match here drops the item
#     tags:       list[str]; carry-through tags on admitted items
#
# This file is **not** a SCVS source — the SCVS data_source_registry
# has its own rows for each *provider* (Reuters, X, Reddit). This file
# is the curator-side seed list that the Playwright crawler consumes.
#
# All seeds below are commented out by default. The autolearn pipeline
# degrades to a no-op when the seed list is empty, so a fresh clone
# never emits noisy CuratedItem rows. Operators uncomment a seed row
# (or add new ones) to begin ingestion. See
# `docs/sensory/web_autolearn_activation.md` for the full activation
# walkthrough.

# ---------------------------------------------------------------------------
# Starter seeds (uncomment to enable)
# ---------------------------------------------------------------------------

