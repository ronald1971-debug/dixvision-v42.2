[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dixvision"
version = "0.0.1"
description = "DIX VISION v42.2 ‚Äî engine + plugin runtime (Phase E0)"
requires-python = ">=3.11"
license = { text = "Proprietary" }
readme = "README.md"
authors = [{ name = "Ronald Vervoort" }]
dependencies = [
    "PyYAML>=6.0",
    # wave-03 cognitive layer is imported unconditionally by
    # ``ui.cognitive_chat_runtime`` (which ``ui.server`` imports at module
    # load), so these MUST be base runtime deps. Hiding them in extras
    # was correct only while the runtime was opt-in (PR #82); it stopped
    # being correct at PR #85 when the runtime moved into ui.server's
    # import graph.
    "langchain-core>=0.3,<1",
    "langgraph>=0.2,<1",
    # AUDIT-P0.1 ‚Äî fastapi / uvicorn / pydantic / websockets are imported
    # at module load by ``ui.server`` (the harness entry point that the
    # Windows launcher and every operator deployment runs). Listing them
    # only under ``[project.optional-dependencies].dev`` meant a bare
    # ``pip install dixvision`` produced an installable package that
    # crashed on import ‚Äî a silent landmine for anyone using standard
    # Python packaging instead of ``pip install -e '.[dev]'`` or the
    # ``requirements.txt`` path. Promoting them to base runtime deps so
    # the package is self-consistent.
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "pydantic>=2.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.5.0",
    "httpx>=0.25",
    # A-13 ‚Äî property-based replay-determinism suites
    # (tests/test_*_property.py) ``pytest.importorskip("hypothesis")``,
    # so without ``hypothesis`` on the dev install the three property
    # suites silently skip. Pinning it in ``[dev]`` so a plain
    # ``pip install -e '.[dev]'`` produces the full test surface;
    # ``.github/workflows/property_tests.yml`` previously masked this
    # via an ad-hoc ``python -m pip install hypothesis`` step that is
    # now redundant.
    "hypothesis>=6.0",
    # D3 ‚Äî UniswapX EIP-712 signer + quote client. ``eth-account`` is
    # the canonical Python implementation of EIP-712 typed-data signing
    # used by Uniswap Labs / Foundation tooling.
    "eth-account>=0.13,<1",
]
evm = [
    "eth-account>=0.13,<1",
]
cognitive = [
    # Kept as a no-op alias for backward compatibility with any
    # external automation that did ``pip install -e .[cognitive]``.
    # The actual deps are now in [project.dependencies].
]
ui = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "pydantic>=2.0",
    "websockets>=12.0",
]
# PR-B (P0-2) ‚Äî lazy-adapter extras. The canonical-adaptation modules
# under ``state/`` and ``sensory/neuromorphic/`` carry an
# ``NEW_PIP_DEPENDENCIES`` tuple that names the optional deps the
# adapter falls back to when a factory is constructed. The tuple was
# documentary-only ‚Äî nothing in the package metadata let an operator
# request the adapter‚Äôs deps via ``pip install dixvision[<tag>]``. The
# three extras below close that gap. The adapter source files keep
# their lazy ``try: import ‚Ä¶ except ImportError`` pattern (so a base
# install of ``dixvision`` still imports clean), but the deps are now
# *requestable* through standard packaging.
parquet = [
    # state/ledger/snapshots.py lazy-imports ``pyarrow`` +
    # ``pyarrow.parquet`` inside the two factory functions when the
    # operator opts into Parquet ledger snapshots (OFFLINE_ONLY).
    "pyarrow>=15.0",
]
memory_tensor = [
    # state/memory_tensor/semantic_qdrant.py lazy-imports
    # ``qdrant_client.QdrantClient`` inside the factory when the
    # persistent semantic-memory backend is enabled.
    "qdrant-client>=1.7,<2",
]
neuromorphic = [
    # sensory/neuromorphic/snntorch_detector.py declares
    # NEW_PIP_DEPENDENCIES = ("snntorch", "torch").
    "snntorch>=0.7",
    # sensory/neuromorphic/snn_lif.py + policy_distillation.py lazy-
    # import ``torch`` (already named above; pinning floor here).
    "torch>=2.0",
    # sensory/neuromorphic/governance_risk_snn.py declares
    # NEW_PIP_DEPENDENCIES = ("bindsnet",).
    "bindsnet>=0.3",
    # sensory/neuromorphic/neuro_prototype.py declares
    # NEW_PIP_DEPENDENCIES = ("brian2",) (RESEARCH_SOURCE).
    "brian2>=2.5",
    # sensory/neuromorphic/spyke_encoder.py declares
    # NEW_PIP_DEPENDENCIES = ("spyketorch",).
    "spyketorch>=0.2",
]

[tool.setuptools.packages.find]
where = ["."]
include = [
    "core*",
    "intelligence_engine*",
    "execution_engine*",
    "system_engine*",
    "governance_engine*",
    "learning_engine*",
    "evolution_engine*",
    "state*",
    "tools*",
    "ui*",
    "system*",
    "enforcement*",
    "immutable_core*",
    "opponent_model*",
    "simulation*",
]
exclude = ["tests*", "rust*", "docs*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "rust",
    "docs",
    ".git",
    ".venv",
    "build",
    "dist",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    # Phase E0 stubs intentionally have unused parameters.
    "B008",
]
