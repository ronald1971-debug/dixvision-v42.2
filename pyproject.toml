[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dix-vision"
version = "42.2.0"
description = "DIX VISION v42.2 — Janus-Sentinel Production Trading System"
requires-python = ">=3.10"
readme = "README.md"
license = { text = "Proprietary" }
authors = [{ name = "DIX VISION" }]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "aiosqlite>=0.19",
    "prometheus-client>=0.20",
    "numpy>=1.26",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.9",
    "import-linter>=2.1",
    "coverage>=7.4",
]
windows = [
    "pywin32>=306; sys_platform == 'win32'",
    "pystray>=0.19; sys_platform == 'win32'",
    "Pillow>=10.0",
]
cockpit = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
]

[project.scripts]
dix = "dix:main"

[tool.setuptools]
py-modules = ["bootstrap_kernel", "main", "dix", "trading", "cockpit", "start", "startup_test", "diagnose_foundation"]

[tool.setuptools.packages.find]
where = ["."]
include = [
    "core*", "enforcement*", "execution*", "governance*", "immutable_core*",
    "interrupt*", "mind*", "observability*", "security*", "state*",
    "system*", "system_monitor*", "translation*", "windows*",
]
exclude = ["data*", "tests*", "tools*", "scripts*"]

[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
strict = false
ignore_missing_imports = true
python_version = "3.10"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
