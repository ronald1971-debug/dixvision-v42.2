# DIX VISION v42.2 — Rust workspace
#
# Staging area for the polyglot migration described in
# docs/DIX_VISION_v42_2_COMPILED.md. During migration every crate
# lives under `rust/<domain>/`; once a module's port PR lands, the
# equivalent `.py` file under `<domain>/` is deleted in the same
# commit. When the migration is complete, crates may be relocated to
# the manifest's target tree (`<domain>/Cargo.toml` directly); the
# move is cosmetic and does not change imports or the public API.
#
# CI note: the accompanying `.github/workflows/rust.yml` only runs
# when files under `rust/**` or the workflow file itself change.
# Any non-cosmetic edit to this manifest is sufficient to trigger
# the job.

[workspace]
resolver = "2"
members = [
    "execution",
    "system",
    "bootstrap",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.78"
license = "Proprietary"
repository = "https://github.com/ronald1971-debug/dixvision-v42.2"

[workspace.lints.rust]
# Safety-critical defaults. Every Tier-0 port PR inherits these.
# Lint *groups* get an explicit lower `priority` so per-lint overrides
# below them take precedence (see clippy::lint_groups_priority).
rust_2018_idioms   = { level = "warn", priority = -1 }
unsafe_code        = "deny"
missing_docs       = "warn"
unused_must_use    = "deny"
# FFI surfaces in system/ will need to opt out of missing_docs on
# auto-generated PyO3 glue — that is allowed per-crate, never
# workspace-wide.

[workspace.lints.clippy]
# Every Tier-0 crate gets the full correctness + suspicious buckets.
all        = { level = "deny", priority = -1 }
pedantic   = { level = "warn", priority = -1 }
nursery    = { level = "warn", priority = -1 }
# Keep our public APIs honest. The trading hot path MUST NOT panic.
panic                  = "deny"
unwrap_used            = "deny"
expect_used            = "deny"
indexing_slicing       = "warn"
integer_division       = "warn"
float_cmp              = "warn"
unreachable            = "deny"
# Perf guards for the hot path.
large_stack_arrays     = "warn"
large_types_passed_by_value = "warn"

[workspace.dependencies]
# Pinned here so every crate picks up the same version. Anything
# added to a member crate's [dependencies] MUST reference
# `workspace = true` unless there's a documented reason.
thiserror  = "1.0"
anyhow     = "1.0"   # test-only: workspace policy forbids anyhow on hot path
prost      = "0.12"  # protobuf runtime for generated stubs
parking_lot = "0.12"

[profile.release]
opt-level       = 3
lto             = "fat"
codegen-units   = 1
panic           = "abort"
debug           = false
strip           = "symbols"

[profile.dev]
opt-level       = 0
debug           = true

# The bench profile is where the latency SLO (p50 < 1 ms, p99 < 5 ms)
# is measured. Keep opt-level/lto/codegen-units identical to release
# so reported numbers are representative of what ships.
#
# NOTE: cargo silently ignores `panic` on the `bench` profile (it is
# always linked with the test harness, which requires unwinding).
# This means bench binaries carry unwinding landing pads that the
# release binary does not. The per-call cost is tens of picoseconds,
# well below the measurement floor of the SLO gates (p50 < 1 ms,
# p99 < 5 ms), so the representativeness claim still holds — but we
# spell it out here so a future reader doesn't chase a phantom
# `panic = "abort"` that cargo would reject.
[profile.bench]
opt-level       = 3
lto             = "fat"
codegen-units   = 1
debug           = false
