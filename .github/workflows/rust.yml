name: rust

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"
      - "system/time_source.py"
      - "system/fast_risk_cache.py"
      - "tests/test_time_source_parity.py"
      - "tests/test_fast_risk_cache_parity.py"
  push:
    branches: [main, develop]
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"
      - "system/time_source.py"
      - "system/fast_risk_cache.py"
      - "tests/test_time_source_parity.py"
      - "tests/test_fast_risk_cache_parity.py"

# Minimum surface first — richer matrix + caching will be added after
# the baseline is green. Keeping each step in its own run: stanza so
# the log line that reports the failure identifies the exact command.
jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: short
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: where am I
        run: |
          set -euxo pipefail
          pwd
          ls -la
          ls -la rust
          rustc --version
          cargo --version
          python --version

      - name: rustfmt
        working-directory: rust
        run: cargo fmt --all --check

      - name: clippy
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        working-directory: rust
        run: cargo test --all --all-features --locked

      # Architectural invariant guard. The workspace must NEVER
      # introduce `unsafe` code outside documented FFI seams. This is
      # ALSO enforced via `#![forbid(unsafe_code)]` at each crate root
      # and via the workspace lint `unsafe_code = "deny"` in
      # rust/Cargo.toml; the grep below is the third line of defence
      # that catches accidental removal of the crate-root attribute
      # in a PR diff.
      - name: forbid unsafe (invariant)
        run: |
          set -euo pipefail
          # Match the `unsafe` keyword token anywhere on a line, then
          # strip the three legitimate forms:
          #   1. documented FFI seams      → `// SAFETY:`
          #   2. the forbid attribute       → `#![forbid(unsafe_code)]`
          #   3. doc/comment mentions       → lines starting with `//` or `//!`
          violations=$(grep -RIn --include='*.rs' -P '\bunsafe\b' rust/ \
                        | grep -v '// SAFETY:' \
                        | grep -Ev '#!\[forbid\(unsafe_code\)\]' \
                        | grep -Ev '^[^:]+:[0-9]+:\s*//' \
                        || true)
          if [ -n "$violations" ]; then
            echo "::error::forbidden 'unsafe' usage found"
            echo "$violations"
            exit 1
          fi
          echo "no unsafe usage — invariant holds"

      # Build the PyO3 extension via maturin and verify the Python
      # parity suite (exercises both the Rust backend end-to-end and
      # the pure-Python fallback in one run). This is the canary
      # gate that proves the polyglot build pipeline works: if
      # maturin can't produce the wheel or the invariants differ
      # between backends, this step fails and the PR is blocked.
      - name: install maturin + pytest
        run: python -m pip install --upgrade pip maturin pytest

      - name: build PyO3 wheel (dixvision_py_system)
        working-directory: rust/py_system
        run: |
          set -euxo pipefail
          maturin build --release --out ../../target/wheels

      - name: install PyO3 wheel
        run: |
          set -euxo pipefail
          WHEEL=$(ls target/wheels/dixvision_py_system-*.whl | head -n1)
          test -n "$WHEEL"
          pip install "$WHEEL"
          python -c "import dixvision_py_system as m; \
                     print('crate_version', m.crate_version()); \
                     print('now', m.now()); \
                     print('mono', m.now_mono_ns()); \
                     print('risk_get', m.risk_get())"

      - name: pytest parity suite
        run: pytest -q tests/test_time_source_parity.py tests/test_fast_risk_cache_parity.py
