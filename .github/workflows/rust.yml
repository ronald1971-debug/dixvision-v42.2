name: rust

on:
  push:
    branches: [main, develop]
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: fmt
        working-directory: rust
        run: cargo fmt --all --check

  clippy:
    name: cargo clippy (deny warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: clippy
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: test
        working-directory: rust
        run: cargo test --all --all-features --locked

  # Build the PyO3 wheel and run the dual-backend parity test against
  # both backends. The Python suite alone (in the main `ci` workflow)
  # only proves the pure-Python reference; this job proves the Rust
  # backend agrees byte-for-byte on every gate branch.
  parity:
    name: python-rust parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: install maturin
        run: python -m pip install --upgrade pip maturin
      - name: install python test deps
        run: python -m pip install pytest pyyaml fastapi pydantic
      - name: build + install dixvision_py_execution wheel
        working-directory: rust/py_execution
        run: |
          maturin build --release --out dist
          python -m pip install --force-reinstall dist/*.whl
      - name: confirm rust backend is wired in
        run: |
          python -c "from execution_engine.hot_path.fast_execute import _rust_backend_available; assert _rust_backend_available(), 'wheel not detected'"
      - name: parity tests (both backends)
        run: python -m pytest tests/test_fast_execute_parity.py tests/test_execution_hot_path.py -v

  # Architectural invariant guard:
  # The workspace must NEVER introduce `unsafe` code outside documented
  # FFI seams. This is ALSO enforced at the crate level via
  # `#![forbid(unsafe_code)]`, but the duplicate grep gate catches
  # accidental removal of that attribute in a PR diff.
  no_unsafe:
    name: forbid unsafe (invariant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep for unsafe blocks
        run: |
          set -euo pipefail
          # Match `unsafe` as a whole word anywhere on the line so we
          # also catch `pub unsafe fn`, `let x = unsafe { ... }`, and
          # `pub(crate) unsafe trait`. Filter out legitimate
          # mentions of the literal token:
          #   * `// SAFETY:` justification comments (a documented FFI seam)
          #   * the `unsafe_code` lint attribute name
          #   * doc comments (lines starting with `//!`, `///`, or `*`
          #     when wrapped in `/* */`) — those discuss the rule, they
          #     don't introduce it.
          violations=$(grep -RIn --include='*.rs' -P '\bunsafe\b' rust/ \
            | grep -v '// SAFETY:' \
            | grep -v 'unsafe_code' \
            | grep -Pv ':\s*///' \
            | grep -Pv ':\s*//!' \
            || true)
          if [ -n "$violations" ]; then
            echo "Forbidden 'unsafe' blocks found:" >&2
            echo "$violations" >&2
            exit 1
          fi
          echo "no unsafe blocks — invariant holds"
