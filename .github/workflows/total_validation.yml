name: TOTAL VALIDATION

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run TOTAL VALIDATION (data gathering)
        # Always exit 0 -- this step produces analysis/*.csv +
        # coverage_summary.json. The strict gate lives in
        # ``tools/enforce.py`` which reads the summary against
        # the regression-floor table.
        run: python tools/total_validation.py --advisory

      - name: TOTAL VALIDATION GATE (strict)
        # PR-P0-3: gate is strict against the regression-floor
        # thresholds pinned in ``tools/enforce.py``. Future PRs
        # that improve a metric must tighten the floor in the
        # same commit; PRs that regress a metric trip CI here.
        run: python tools/enforce.py --strict

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: total-validation-report
          path: analysis/
          if-no-files-found: warn
          retention-days: 30

      - name: Render summary on PR
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## TOTAL VALIDATION report"
            echo ""
            echo '```json'
            cat analysis/coverage_summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
