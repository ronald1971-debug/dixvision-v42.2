name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Authority lint (T1 / C2 / C3 / W1 / L1 / L2 / L3 / B1)
        run: python tools/authority_lint.py --strict .

      - name: SCVS lint (SCVS-01 / SCVS-02)
        run: python tools/scvs_lint.py .

      - name: Pytest
        run: pytest -q
