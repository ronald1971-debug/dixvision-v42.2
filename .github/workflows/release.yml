name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  portable-windows:
    name: build portable DIX-VISION.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.6.0

      - name: build exe
        run: pyinstaller --noconfirm --clean windows/DIX-VISION.spec

      - name: stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/DIX-VISION.exe release/DIX-VISION.exe
          Get-FileHash release/DIX-VISION.exe -Algorithm SHA256 `
            | Select-Object -ExpandProperty Hash `
            | Out-File -FilePath release/DIX-VISION.exe.sha256 -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: DIX-VISION-windows-portable
          path: release/

      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/DIX-VISION.exe
            release/DIX-VISION.exe.sha256

  source-zip:
    name: source ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: package
        run: |
          mkdir -p release
          zip -r release/dix-vision-src.zip . \
            -x '.git/*' '.github/*' '*/__pycache__/*' 'data/*' '.venv/*' \
               'node_modules/*' 'dist/*' 'build/*' '*.pyc'
          sha256sum release/dix-vision-src.zip > release/dix-vision-src.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: dix-vision-src
          path: release/
      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/dix-vision-src.zip
            release/dix-vision-src.zip.sha256
