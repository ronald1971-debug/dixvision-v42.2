name: shadow
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  shadow-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: short shadow run
        env:
          DIX_VISION_MODE: SHADOW
        run: |
          timeout 20 python main.py || true
          python dix.py ledger check
